# Janus Server — nginx 反向代理 + 负载均衡 + SSE 流式。
#
# 关键:LLM 响应是流式(SSE)。proxy_buffering off + 长读超时是硬约束 —— 否则 nginx
# 会缓冲整个响应,首字延迟爆炸,流式体验全毁(README: SSE 流式必配)。

user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 真实客户端 IP:副本在 nginx 后面,把客户端 IP 经 X-Forwarded-For 透传给上游
    # (应用侧据 trusted_proxy_count 从右往左数取真实 IP 做按-IP 限流)。
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # 上游:全功能副本池。compose `--scale app=N` 后,nginx 通过 docker DNS 解析到
    # 多个 app 容器做负载均衡(无状态副本,无需会话粘滞)。
    upstream janus_app {
        server app:8000;
        # scale 到多副本时 docker 的内置 DNS 轮询会带出全部 app 实例。
    }

    server {
        listen       80;
        server_name  _;

        # 上传体积上限:头像 2MB / 通用附件 10MB(应用侧也校验);给 nginx 留余量。
        client_max_body_size  16m;

        location / {
            proxy_pass         http://janus_app;
            proxy_http_version 1.1;

            # 透传真实客户端信息(应用按 X-Forwarded-For 还原客户端 IP)。
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE 流式(硬约束):关缓冲 + 长读超时,否则 LLM 流式响应被 nginx 攒着不发,
            # 首字延迟爆炸。关 cache、置空 Connection 让上游 keep-alive 透传。
            proxy_buffering     off;
            proxy_cache         off;
            proxy_read_timeout  600s;
            proxy_set_header    Connection "";
        }

        # 存活探针走裸路径,不必经鉴权(应用侧已列入 public path)。
        location /health/ {
            proxy_pass         http://janus_app;
            proxy_set_header   Host  $host;
            access_log         off;
        }
    }
}

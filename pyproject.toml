[build-system]
requires = ["hatchling>=1.27,<2"]
build-backend = "hatchling.build"

[project]
name = "janus-server"
version = "0.1.0"
description = "Unified internal AI infrastructure backend."
readme = "README.md"
requires-python = ">=3.11,<3.12"
dependencies = [
    "aioboto3>=13.2,<16",
    "alembic>=1.16,<2",
    "argon2-cffi>=25.1,<26",
    "arq>=0.26,<1",
    "asyncpg>=0.30,<1",
    "cryptography>=45,<47",
    "fastapi>=0.115,<1",
    "httpx>=0.28,<1",
    "litellm>=1.82,<2",
    "mcp>=1.9,<2",
    "pillow>=11,<12",
    "prometheus-client>=0.22,<1",
    "pydantic>=2.11,<3",
    "pydantic-settings>=2.9,<3",
    "pyjwt[crypto]>=2.10,<3",
    "python-multipart>=0.0.18,<1",
    "redis>=5,<7",
    "sqlalchemy[asyncio]>=2.0.41,<3",
    "structlog>=26.1,<27",
    "uvicorn[standard]>=0.34,<1",
]

[project.optional-dependencies]
dev = [
    "aiosqlite>=0.21,<1",
    "mypy>=1.16,<2",
    "pytest>=8.4,<9",
    "pytest-asyncio>=1.0,<2",
    "pytest-cov>=7.1,<8",
    "ruff>=0.11,<1",
    "types-aioboto3[s3]>=13.2,<16",
]

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100
# Alembic migration scripts are autogenerated; exclude from lint (codegen output,
# not hand-maintained). They are still formatted via `ruff format`.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
disallow_untyped_decorators = false
plugins = ["pydantic.mypy"]

[tool.alembic]
script_location = "alembic"
